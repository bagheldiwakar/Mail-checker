services:
  - type: web
    name: mail-checker
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python src/server.py
    healthCheckPath: /health
    envVars:
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: IMAP_SERVER
        value: imap.gmail.com
      - key: IMAP_PORT
        value: "993"
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_EMAILS_PER_CHECK
        value: "5"
      - key: GROQ_REQUEST_DELAY_SECONDS
        value: "2"
      - key: NOTIFIER_MODE
        value: auto
      - key: NTFY_TOPIC
        sync: false
      - key: NTFY_SERVER
        value: https://ntfy.sh
      - key: YOUR_NAME
        sync: false
      - key: ALERT_EMAIL
        sync: false
